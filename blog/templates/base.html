<!DOCTYPE html>
<html>

    <head>
        <title>blog.saprunov.dev</title>
        
<link>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">
        <meta name="google" content="notranslate" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    </head>

    <body class="d-flex flex-column min-vh-100">
        <style>
            body {
            font-family: "Courier Prime", monospace;
            font-size: 17px;
            background-color: #212121;
            }

            input{
            border-style: none;
            background: transparent;
            max-width: 100px;
            }

            p,h1,h2,h3,h4,h5,h6{
                color: #D8D7D1;
            }

            a{
                color: #D8D7D1;
            }

        .btn-danger {
            color: #fff;
            background-color: #f00000;
            border-color: #dc281e;
        }
        .masthead {
            height: auto;
            padding-bottom: 15px;
            padding-top: 10px;
        }

        .card{
            box-shadow: none;
            border-radius: 0;
            background-color: transparent;
            border: solid 1px #00BF00;
        }
        .card-header {
            border-bottom: dashed 1px #00BF00;
        }

        .navbar-brand{
            color: #D8D7D1;
            margin-left: 15px;
        }

        .container{
            flex-wrap: wrap;
        }

        .green-stroke{
            border-radius: 0;
            background-color: transparent;
            border: solid 1px #00BF00;
        }

        .container{
            padding-left: 0px;
            padding-right: 0px;
        }

    </style>

        <!-- Navigation -->
        <nav class="navbar" id="mainNav">
            <div class="container green-stroke">
                <div class="container-fluid"></div>
                    <a class="navbar-brand" href="{% url 'home' %}">SAPRUNOV.DEV</a>
                    <input type="text" placeholder="[ find/ ]">
                </div>
            </div>
        </nav>
        {% block content %}
        <!-- Content Goes here -->
        {% endblock content %}
        <!-- Footer -->
        <footer class="mt-auto">
            <p class="m-0 text-dark text-center ">Copyright &copy; Saprunov.dev</p>
        </footer>
    </body>
</html>
